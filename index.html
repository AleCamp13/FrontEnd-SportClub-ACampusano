<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SportClub</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;

            /* Imagen de fondo */
            background-image: url("Fondo gimnasio SportClub.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            color: #1f2937;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(6px);

            width: 100%;
            max-width: 400px;

            padding: 40px 35px;

            border: 1px solid #dbe4ee;
            border-radius: 18px;

            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);

            text-align: center;
        }

        /* Logo */
        .logo-img {
            width: 260px;
            margin-bottom: 20px;
        }

        .login-card h2 {
            font-size: 26px;
            margin-bottom: 25px;
            color: #111827;
        }

        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #111827;
        }

        input {
            width: 100%;
            padding: 14px;

            border: 1px solid #cbd5e1;
            border-radius: 10px;

            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 8px rgba(37, 99, 235, 0.25);
        }

        button {
            width: 100%;

            background-color: #2563eb;
            color: white;

            border: none;
            padding: 14px;

            border-radius: 10px;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;
            margin-top: 10px;

            transition: 0.3s;
        }

        button:hover {
            background-color: #1d4ed8;
            transform: scale(1.02);
        }

        .links {
            margin-top: 22px;

            display: flex;
            justify-content: space-between;

            gap: 10px;
        }

        .links a {
            color: #2563eb;
            text-decoration: none;

            font-size: 14px;
            font-weight: bold;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-card">

        <!-- Logo -->
        <img src="logo_empresa_letra_v1.png" alt="Logo SportClub" class="logo-img">

        <h2>Iniciar Sesión</h2>

        <form>

            <div class="form-group">
                <label for="correo">Correo electrónico</label>

                <input 
                    type="email" 
                    id="correo"
                    placeholder="Ingresa tu correo"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>

                <input 
                    type="password" 
                    id="password"
                    placeholder="Ingresa tu contraseña"
                    required>
            </div>
<div class="form-group">
    <label for="nombre">Nombre completo</label>
    <input type="text" id="nombre" placeholder="Ingresa tu nombre" required>
</div>

<div class="form-group">
    <label for="edad">Edad</label>
    <input type="number" id="edad" placeholder="Ingresa tu edad" required>
</div>

<div class="form-group">
    <label for="deporte">¿Practicas algún deporte?</label>
    <input type="text" id="deporte" placeholder="Ejemplo: fútbol, yoga, running">
</div>

<div class="form-group">
    <label for="actividad">Tipo de actividad que te interesa</label>
    <input type="text" id="actividad" placeholder="Ejemplo: gimnasio, clases grupales">
</div>

<div class="form-group">
    <label for="objetivo">Objetivo personal</label>
    <input type="text" id="objetivo" placeholder="Ejemplo: bajar de peso, mantenerse activo">
</div>

            <button type="submit">
                Iniciar sesión
            </button>

        </form>

        <div class="links">
            <a href="#">Recuperar contraseña</a>
            <a href="#">Registrarse</a>
        </div>

    </div>

</body>

</html>
