<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | SportClub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/api.css?v=20260617-header1">
  <link rel="icon" href="../assets/img/logo-original.png">
</head>
<body class="d-flex align-items-center justify-content-center">
  <main class="auth-card">
    <img class="auth-logo" src="../assets/img/logo.png" alt="Logo oficial SportClub">
    <h1>Registro de usuario</h1>
    <p class="subtitle">Crea tu cuenta para reservar clases.</p>

    <form id="registerForm" novalidate>
      <div id="registerMessage" class="message" hidden></div>

      <div class="mb-3">
        <label class="form-label" for="full_name">Nombre completo</label>
        <input class="form-control" id="full_name" name="full_name" type="text" autocomplete="name" required>
        <div class="invalid-feedback"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="email">Correo</label>
        <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
        <div class="invalid-feedback"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="birth_date">Fecha de nacimiento</label>
        <input class="form-control" id="birth_date" name="birth_date" type="date">
        <div class="invalid-feedback"></div>
      </div>

      <div class="row">
        <div class="col-md-8 mb-3">
          <label class="form-label" for="sport_name">Deporte favorito</label>
          <input class="form-control" id="sport_name" name="sport_name" type="text" placeholder="Yoga, futbol, spinning">
          <div class="invalid-feedback"></div>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label" for="sport_frequency">Veces/semana</label>
          <input class="form-control" id="sport_frequency" name="sport_frequency" type="number" min="0" step="1">
          <div class="invalid-feedback"></div>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Contrasena</label>
        <input class="form-control" id="password" name="password" type="password" autocomplete="new-password" required>
        <div class="invalid-feedback"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="confirm_password">Confirmar contrasena</label>
        <input class="form-control" id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
        <div class="invalid-feedback"></div>
      </div>

      <button class="btn btn-sport" type="submit">
        <i class="bi bi-person-plus me-1"></i> Registrar
      </button>
    </form>

    <a class="back-home d-block text-center mt-4" href="login.html">
      <i class="bi bi-arrow-left-short"></i> Volver al inicio de sesion
    </a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js?v=20260617-header1"></script>
</body>
</html>
