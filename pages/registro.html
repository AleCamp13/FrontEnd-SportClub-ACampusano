<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro | SportClub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="icon" href="../assets/img/logo-original.png">
</head>
<body class="d-flex align-items-center justify-content-center">
  <main class="auth-card">
    <img class="auth-logo" src="../assets/img/logo.png" alt="Logo oficial SportClub">
    <h1>Registro de usuario</h1>
    <p class="subtitle">Crea tu cuenta para reservar clases.</p>

    <form id="registerForm" novalidate>
      <!-- Espacio para retroalimentación: vacío y oculto hasta que exista un mensaje real -->
      <div id="registerMessage" class="message" hidden></div>

      <div class="mb-3">
        <label class="form-label" for="name">Nombre</label>
        <input class="form-control" id="name" type="text" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="email">Correo</label>
        <input class="form-control" id="email" type="email" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="pass">Contraseña</label>
        <input class="form-control" id="pass" type="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="pass2">Confirmar contraseña</label>
        <input class="form-control" id="pass2" type="password" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="info">Información adicional</label>
        <input class="form-control" id="info" type="text" placeholder="Objetivo, deporte favorito o experiencia">
      </div>
      <button class="btn btn-sport" type="submit"><i class="bi bi-person-plus me-1"></i> Registrar</button>
    </form>

    <a class="back-home d-block text-center mt-4" href="login.html"><i class="bi bi-arrow-left-short"></i> Volver al inicio de sesión</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
