<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contrasena | SportClub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/api.css">
</head>
<body class="d-flex align-items-center justify-content-center">
  <main class="auth-card">
    <img class="auth-logo" src="../assets/img/logo.png" alt="Logo oficial SportClub">
    <h1>Recuperar contrasena</h1>
    <p class="subtitle">Ingresa tu correo para continuar.</p>

    <form id="recoveryForm" novalidate>
      <div id="recoveryMessage" class="message" hidden></div>

      <div class="mb-3">
        <label class="form-label" for="email">Correo</label>
        <input class="form-control" id="email" name="email" type="email" autocomplete="email" required>
        <div class="invalid-feedback"></div>
      </div>

      <button class="btn btn-sport" type="submit">
        <i class="bi bi-send me-1"></i> Enviar
      </button>
    </form>

    <a class="back-home d-block text-center mt-3" href="login.html">Volver</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js?v=20260617-reservas2"></script>
</body>
</html>
