<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil | SportClub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/dashboard-user.css">
  <link rel="stylesheet" href="../css/api.css">
</head>
<body data-page="profile" data-required-role="any">
  <header class="topbar py-3">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
      <a href="../index.html"><img class="sport-logo" src="../assets/img/logo.png" alt="Logo oficial SportClub"></a>
      <div class="d-flex flex-wrap gap-3 align-items-center">
        <span id="currentUserName" class="fw-bold"></span>
        <span id="currentUserRole"></span>
        <a class="js-logout" href="login.html"><i class="bi bi-box-arrow-right"></i> Cerrar Sesion</a>
      </div>
    </div>
  </header>

  <nav class="dash-nav">
    <div class="container">
      <ul class="nav gap-3">
        <li class="nav-item"><a class="nav-link" href="dashboard-usuario.html"><i class="bi bi-house"></i> Inicio</a></li>
        <li class="nav-item"><a class="nav-link active" href="perfil.html"><i class="bi bi-person"></i> Perfil</a></li>
      </ul>
    </div>
  </nav>

  <main class="container py-4">
    <section class="dash-card mb-4">
      <div class="d-flex flex-column flex-lg-row justify-content-between gap-3 align-items-lg-center">
        <div>
          <h1 class="h3 fw-bold section-title mb-1">Mi Perfil</h1>
          <p class="mb-0 text-muted">Gestiona tu informacion personal.</p>
        </div>
        <span class="readonly-pill"><i class="bi bi-shield-check"></i> Sesion activa</span>
      </div>
    </section>

    <section class="row g-4 mb-4">
      <article class="col-lg-4">
        <div class="dash-card h-100">
          <div class="profile-avatar mb-3"><i class="bi bi-person-fill"></i></div>
          <h2 id="profileName" class="h4 fw-bold section-title">Cargando...</h2>
          <p class="mb-2"><b>Email:</b> <span id="profileEmail"></span></p>
          <p class="mb-2"><b>Rol:</b> <span id="profileRole"></span></p>
          <p class="mb-2"><b>Fecha nacimiento:</b> <span id="profileBirthDate"></span></p>
          <p class="mb-0"><b>Actividad:</b> <span id="profileSport"></span></p>
        </div>
      </article>

      <article class="col-lg-8">
        <div class="dash-card h-100">
          <h2 class="h4 fw-bold section-title">Datos personales</h2>
          <div id="profileMessage" class="message" hidden></div>

          <form id="profileForm" class="row g-3" novalidate>
            <div class="col-md-6">
              <label class="form-label" for="full_name">Nombre completo</label>
              <input class="form-control" id="full_name" name="full_name" type="text" required>
              <div class="invalid-feedback"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" readonly required>
              <div class="invalid-feedback"></div>
            </div>

            <div class="col-md-6">
              <label class="form-label" for="birth_date">Fecha de nacimiento</label>
              <input class="form-control" id="birth_date" name="birth_date" type="date">
              <div class="invalid-feedback"></div>
            </div>

            <div class="col-md-4">
              <label class="form-label" for="sport_name">Deporte o actividad</label>
              <input class="form-control" id="sport_name" name="sport_name" type="text">
              <div class="invalid-feedback"></div>
            </div>

            <div class="col-md-2">
              <label class="form-label" for="sport_frequency">Veces/semana</label>
              <input class="form-control" id="sport_frequency" name="sport_frequency" type="number" min="0" step="1">
              <div class="invalid-feedback"></div>
            </div>

            <div class="col-12">
              <button class="btn btn-role" type="submit">
                <i class="bi bi-save"></i> Guardar cambios
              </button>
            </div>
          </form>
        </div>
      </article>
    </section>

    <section class="dash-card mb-4">
      <h2 class="h4 fw-bold section-title">Seguridad</h2>
      <div id="passwordMessage" class="message" hidden></div>

      <form id="passwordForm" class="row g-3" novalidate>
        <div class="col-md-4">
          <label class="form-label" for="current_password">Contrasena actual</label>
          <input class="form-control" id="current_password" name="current_password" type="password" autocomplete="current-password" required>
          <div class="invalid-feedback"></div>
        </div>

        <div class="col-md-4">
          <label class="form-label" for="new_password">Nueva contrasena</label>
          <input class="form-control" id="new_password" name="new_password" type="password" autocomplete="new-password" required>
          <div class="invalid-feedback"></div>
        </div>

        <div class="col-md-4">
          <label class="form-label" for="confirm_password">Confirmar contrasena</label>
          <input class="form-control" id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" required>
          <div class="invalid-feedback"></div>
        </div>

        <div class="col-12">
          <button class="btn btn-role" type="submit">
            <i class="bi bi-key"></i> Guardar cambios
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js?v=20260617-pauta1"></script>
</body>
</html>
