<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión | SportClub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="icon" href="../assets/img/logo-original.png">
</head>
<body class="d-flex align-items-center justify-content-center">

  <!-- Card de inicio de sesión: estructura centrada con identidad SportClub -->
  <main class="auth-card">
    <img class="auth-logo" src="../assets/img/logo.png" alt="Logo oficial SportClub">
    <h1>Inicio de sesión</h1>
    <p class="subtitle">Ingresa tus datos y continúa entrenando.</p>

    <form id="loginForm" novalidate>
      <!-- Campos obligatorios de acceso (prototipo estático, sin autenticación real) -->
      <div class="mb-3">
        <label class="form-label" for="email">Correo</label>
        <input class="form-control" id="email" type="email" placeholder="correo@ejemplo.cl" required>
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Contraseña</label>
        <input class="form-control" id="password" type="password" placeholder="Ingresa tu contraseña" required>
      </div>
      <div class="row">
        <div class="col-8 mb-3">
          <label class="form-label" for="nombre">Nombre de la persona</label>
          <input class="form-control" id="nombre" type="text" placeholder="Ej: Alejandra Campusano">
        </div>
        <div class="col-4 mb-3">
          <label class="form-label" for="edad">Edad</label>
          <input class="form-control" id="edad" type="number" min="1" placeholder="34">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label" for="actividad">Tipo de actividad que le interesa</label>
        <select class="form-select" id="actividad">
          <option>Yoga</option><option>Spinning</option>
          <option>Entrenamiento funcional</option><option>Crossfit</option><option>Pilates</option>
        </select>
      </div>
      <button class="btn btn-sport" type="submit"><i class="bi bi-box-arrow-in-right me-1"></i> Ingresar como usuario</button>
    </form>

    <div class="auth-links">
      <a href="recuperar.html"><i class="bi bi-key me-1"></i>¿Olvidaste tu contraseña?</a>
      <a href="registro.html"><i class="bi bi-person-plus me-1"></i>Crear cuenta</a>
    </div>

    <!-- ===== Selector de perfil · Accesos rápidos para revisión ===== -->
    <!-- Botones para seleccionar y entrar a cada perfil del sistema -->
    <section class="profile-select">
      <div class="ps-head">
        <span class="ps-tag">Accesos rápidos para revisión</span>
        <h2>Selecciona tu perfil</h2>
        <p class="ps-sub">Entra directamente al panel de cada rol.</p>
      </div>
      <div class="role-grid">
        <a class="role-btn user" href="dashboard-usuario.html">
          <span class="role-ic"><i class="bi bi-person-fill"></i></span>
          <span class="role-name">Usuario</span>
          <span class="role-go">Entrar <i class="bi bi-arrow-right-short"></i></span>
        </a>
        <a class="role-btn coach" href="dashboard-coach.html">
          <span class="role-ic"><i class="bi bi-clipboard2-pulse-fill"></i></span>
          <span class="role-name">Coach</span>
          <span class="role-go">Entrar <i class="bi bi-arrow-right-short"></i></span>
        </a>
        <a class="role-btn admin" href="dashboard-admin.html">
          <span class="role-ic"><i class="bi bi-shield-lock-fill"></i></span>
          <span class="role-name">Administrador</span>
          <span class="role-go">Entrar <i class="bi bi-arrow-right-short"></i></span>
        </a>
      </div>
    </section>

    <a class="back-home d-block text-center mt-4" href="../index.html"><i class="bi bi-arrow-left-short"></i> Volver al inicio</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
</body>
</html>
