<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesion | SportClub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
  <link rel="stylesheet" href="../css/api.css">
  <link rel="icon" href="../assets/img/logo-original.png">
</head>
<body class="d-flex align-items-center justify-content-center">
  <main class="auth-card">
    <img class="auth-logo" src="../assets/img/logo.png" alt="Logo oficial SportClub">
    <h1>Inicio de sesion</h1>
    <p class="subtitle">Ingresa tus credenciales de SportClub.</p>

    <form id="loginForm" novalidate>
      <div id="loginMessage" class="message" hidden></div>

      <div class="mb-3">
        <label class="form-label" for="email">Correo</label>
        <input class="form-control" id="email" name="email" type="email" placeholder="correo@ejemplo.cl" autocomplete="email" required>
        <div class="invalid-feedback"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="password">Contrasena</label>
        <input class="form-control" id="password" name="password" type="password" placeholder="Ingresa tu contrasena" autocomplete="current-password" required>
        <div class="invalid-feedback"></div>
      </div>

      <button class="btn btn-sport" type="submit">
        <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
      </button>
    </form>

    <div class="auth-links">
      <a href="recuperar.html"><i class="bi bi-key me-1"></i>Recuperar contrasena</a>
      <a href="registro.html"><i class="bi bi-person-plus me-1"></i>Crear cuenta</a>
    </div>

    <a class="back-home d-block text-center mt-4" href="../index.html">
      <i class="bi bi-arrow-left-short"></i> Volver al inicio
    </a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js?v=20260617-pauta1"></script>
</body>
</html>
